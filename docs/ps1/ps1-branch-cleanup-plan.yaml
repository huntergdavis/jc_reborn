repository_size_reduction_opportunities:
  - area: binary_library_payloads
    opportunity: remove_regenerable_cd_images_from_repo
    expected_effect: major
    rationale: >
      The historical binary library is useful as provenance, but the checked-in
      `.bin` and `.cue` payloads are rebuildable from history and dominate the
      repo footprint.
    preferred_retention:
      - small_index_or_manifest
      - metadata_json
      - build_logs_if_needed_for_forensics
    preferred_removal_order:
      - ".bin"
      - ".cue"
      - ".exe after rebuild reproducibility is confirmed"

  - area: large_historical_artifact_dirs
    opportunity: archive_out_of_repo
    expected_effect: major
    candidate_paths:
      - binary-library
      - regtest-references
      - vision-artifacts
      - host-script-review
    rationale: >
      These directories reflect prior validation eras and can be indexed and
      archived without remaining on the main branch surface.

archive_manifest_requirements:
  required_before_removing_large_rebuildable_artifacts: true
  applies_to:
    - binary-library
    - regtest-references
    - vision-artifacts
    - host-script-review
  minimum_manifest_fields:
    - relative_path
    - artifact_class
    - byte_size
    - sha256_if_kept_out_of_repo
    - originating_commit_or_generation_source
    - regeneration_command_if_rebuildable
    - retention_decision
    - archive_destination
  binary_library_specific_requirements:
    - preserve_or_generate_a_searchable_index_with_sequence_commit_date_and_subject
    - preserve_enough_metadata_to_rebuild_a_specific_entry_on_demand
    - test_rebuild_a_small_sample_before_dropping_executables_or_disc_images
  removal_gate:
    - "No large artifact deletion until the manifest exists."
    - "No binary-library payload deletion until at least one sample rebuild has been proven from retained metadata."

