definition_of_done:
  - "A new contributor can identify the current PS1 method from docs/ps1 without reading research logs."
  - "FISHING 1 is explicitly documented as the first fully working PS1 reference scene, including SFX."
  - "`fgpilot` is documented as the proven current render path, not as a side experiment."
  - "Primary validation status is reset to a clean 1 / 63 model with only FISHING 1 complete."
  - "Primary docs cite the source of every reused historical count, milestone, and methodology-pivot claim."
  - "Historical status numbers remain searchable, but each is route-qualified and definition-qualified."
  - "Binary-library and similar heavy regression tooling are archived or clearly secondary."
  - "Historical research is preserved, but current truth is no longer buried under it."
  - "The archaeology package preserves the operator-plus-agent working style strongly enough to support a future reporter-style blog post."
  - "Every deprecated path has a searchable ledger entry with archive or removal metadata."
  - "The branch keeps enough indexed archaeology to support a future blog post or postmortem."
  - "The cleanup does not modify or destabilize the fully working FISHING 1 scene path."
