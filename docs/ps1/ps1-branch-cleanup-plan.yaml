      host_capture_bundle_size: 376M

  primary_render_methodology:
    internal_code_name: fgpilot
    external_description: primary_ps1_hybrid_scene_playback_path
    status: proven_primary_method
    summary: >
      PS1 scene work now uses host-captured foreground playback packs for
      transient scene content and a runtime island/ocean scene base for PS1
      background behavior, with host-captured sound events now replayed through
      the PS1 SFX path. This is no longer a theory, test, or experiment. It is
      the current rendering methodology that produced the fully working FISHING
      1 baseline.
    host_side_pipeline:
      - "Capture authoritative desktop frames, metadata, and sound events with scripts/capture-host-scene.sh"
      - "Export the FISHING 1 pilot bundle with scripts/export-scene-foreground-pilot.sh"
      - "Build PS1 foreground packs with scripts/build-scene-foreground-pack.py, including sound-event payloads"
      - "Build draw-event pack with scripts/build-foreground-draw-pack.py"
    ps1_side_pipeline:
      - "Boot fgpilot scene path"
      - "Preload BACKGRND.BMP before heavy bg-tile allocation"
      - "Load scene base via OCEAN00.SCR / ISLETEMP.SCR / NIGHT.SCR"
      - "Animate shoreline waves in the runtime backdrop path"
      - "Replay scene-relative foreground frames from FG1"
      - "Replay captured SFX events through PS1 sound playback"
      - "Restamp holiday overlay after foreground composition"
      - "Use rect-based clean background backups for the dynamic area only"
    hard_rules:
      - "Keep `fgpilot` as an internal code term if needed, but document it as the main PS1 render path."
      - "Do not frame the active path as `fg test`, `pilot-only`, `theory`, `proposed`, or `temporary`."
      - "Do not present binary-library archaeology as the default way to move the branch forward."
      - "Use scene-by-scene human validation as the acceptance gate."
      - "Treat full dynamic ADS recreation as optional legacy context, not the current reference path."
    scope_boundary:
      - "Document fgpilot as the current PS1 scene-work methodology."
      - "Do not imply that every scene is already finished merely because FISHING 1 is finished."
      - "Use FISHING 1 as the reference implementation for how future scenes should be brought up."

  platform_positioning:
    desktop_host_role: authoritative_renderer_and_capture_source
    ps1_role: hybrid_playback_target
    unique_port_character:
      - "Unlike desktop/native paths, PS1 does not need to recreate the entire original dynamic scene graph at runtime for validated scenes."
      - "PS1 correctness is achieved by combining offline-authored foreground content with narrow runtime background logic."
      - "This branch should describe that hybrid model as deliberate engineering, not as a compromise hidden behind experimental wording."

status_model_correction:
  problem: >
    Some checked-in scene status surfaces still describe FISHING 1 as blocked.
    That conflicts with the current validated fgpilot baseline, but it may still
    reflect the old story-scene or raw regtest route rather than the current
    fgpilot route.
  required_fix: >
    Do not blindly replace every `blocked` marker with `verified`. Split status
    surfaces by route where needed.
  preferred_status_axes:
    - story_route_status
    - fgpilot_route_status
    - reference_scene_status
  immediate_example:
    path: config/ps1/regtest-scenes.txt
    current_entry: "FISHING 1 17 blocked story scene 17"
    interpretation: >
      This likely describes the story/regtest route, not the validated fgpilot
      route. Future cleanup should preserve that distinction instead of erasing
      it.

red_team_findings:
  first_pass_issues_found:
    - issue: git_recency_is_not_script_usage
      correction: >
        The hardened plan now treats git history as last-modified evidence only,
        not proof that a script is unused or safe to remove.
    - issue: methodology_scope_needed_tighter_boundaries
      correction: >
        The hardened plan now states clearly that FISHING 1 is the proven
        baseline and reference implementation, not automatic proof of complete
        scene coverage.
    - issue: binary_library_removal_needed_archive_guards
      correction: >
        The hardened plan now requires an archive manifest and sample
        reproducibility checks before dropping rebuildable payloads.
    - issue: stale_reference_list_was_incomplete
      correction: >
        The hardened plan now explicitly includes additional stale surfaces such
        as docs/ps1/regtest-quickstart.md.

editorial_red_team_findings:
  second_pass_issues_found:
    - issue: earlier_versions_did_not_define_which_sources_win_when_docs_conflict
      correction: >
        This pass adds an explicit evidence hierarchy and citation backbone so
        future cleanup work can distinguish primary artifacts from stale
        summaries.
    - issue: historical_status_numbers_were_too_easy_to_flatten_into_one_story
      correction: >
        This pass records the distinct meanings of `25 / 63`, `27 / 63`,
        `57 / 63`, `60 / 63`, and `63 / 63` so they are preserved as
        historical truth surfaces instead of blended into a false linear
        narrative.
    - issue: the_march_29_validation_log_needed_explicit_demotion_language
      correction: >
        This pass treats that `63 / 63` surface as a historical false summit:
        valuable evidence about what the harness could do at the time, but not
        usable as current scene-correct validation truth.
    - issue: release_tag_provenance_was_easy_to_nitpick
      correction: >
        This pass distinguishes the annotated tag object from the dereferenced
        release commit so the milestone can be cited precisely.
    - issue: the_reporter_roles_risked_sounding_more_literal_than_the_evidence_supports
      correction: >
        This pass keeps the role framing explicitly documentary and ties it back
        to concrete files, manifests, and commit ranges.

evidence_hierarchy:
  precedence_order:
    - tier: 1
      name: primary_runtime_and_repo_artifacts
      examples:
        - source_code_and_current_configs
        - generated_pack_metadata_and_artifact_manifests
        - release_tags_and_dereferenced_release_commits
        - git_history_when_used_to_establish_what_the_branch_believed_at_a_given_time
      editorial_rule: highest_weight_for_current_truth_and_asset_provenance
    - tier: 2
      name: contemporaneous_worklogs_and_research_notes
      examples:
        - docs/ps1/research/OFFLINE_SCENE_PLAYBACK_PIVOT_2026-04-12.md
        - docs/ps1/research/WATER_ANIMATION_WORKLOG_2026-04-21.md
        - docs/ps1/research/HARNESS_WORKLOG_2026-03-28.md
      editorial_rule: strong_evidence_for_why_decisions_changed
    - tier: 3
      name: curated_status_docs_and_operator_guides
      examples:
        - docs/ps1/current-status.md
        - docs/ps1/TESTING.md
        - docs/ps1/project-history.md
      editorial_rule: preserve_as_historical_snapshots_when_they_conflict_with_tier_1_or_tier_2
    - tier: 4
      name: retrospective_interpretation
      examples:
        - this_cleanup_plan
        - future_blog_post_material
      editorial_rule: must_cite_lower_tiers_for_every_nontrivial_claim
  conflict_rules:
    - if_a_later_primary_artifact_conflicts_with_an_older_status_doc_the_status_doc_becomes_history_not_truth
    - if_a_number_is_reused_without_its_original_definition_it_is_invalid_for_primary_docs
    - commit_messages_can_establish_what_the_branch_claimed_at_the_time_but_not_what_must_be_treated_as_current_truth
    - historical_docs_should_be_quoted_as_historical_definitions_not_as_universal_metrics

