project_archaeology_plan:
  objective: >
    Preserve the technical journey of the PS1 branch so cleanup reduces noise
    without erasing the evidence needed for a future long-form writeup, blog
    post, or postmortem.
  required_before_major_archival:
    - produce_a_timeline_index_of_major_eras_commits_docs_and_artifacts
    - produce_a_status_definition_timeline_so_old_counts_remain_searchable_but_not_confusing
    - summarize_each_retired_harness_family_and_why_it_existed
    - capture_key_assumptions_that_drove_each_phase
    - capture_the_memory_constraints_and_runtime_findings_that_changed_direction
    - retain_enough_examples_from_each_era_to_tell_the_story_later
  archaeology_outputs_to_create_later:
    - path: docs/ps1/archaeology/timeline.yaml
      purpose: dated_era_index_with_key_commits_docs_and_artifacts
    - path: docs/ps1/archaeology/tools.yaml
      purpose: catalog_of_harnesses_scripts_and_what_each_one_was_for
    - path: docs/ps1/archaeology/status-surfaces.yaml
      purpose: what_each_historical_progress_number_meant_and_why_it_changed
    - path: docs/ps1/archaeology/team-perspective.yaml
      purpose: roles_shared_values_and_voice_shift_between_operator_and_agents
    - path: docs/ps1/archaeology/assumptions.yaml
      purpose: assumption_disproof_and_replacement_ledger
    - path: docs/ps1/archaeology/memory-constraints.md
      purpose: why_memory_shape_drove_the_methodology_shift
    - path: docs/ps1/archaeology/blog-source-map.md
      purpose: direct_pointers_for_future_long_form_writing
    - path: docs/ps1/archaeology/reporter-notes.md
      purpose: narrative_field_notes_for_future_blog_post_tone_and_structure
  historical_assumptions_to_capture:
    - assumption: broad_automation_would_be_the_primary_truth_surface
      why_it_made_sense: lots_of_scenes_and_a_need_for_scalable_feedback
      what_changed: human_scene_by_scene_signoff_proved_more_useful_for_the_final_method
      replacement_insight: automation_is_supporting_archaeology_not_primary_certification
    - assumption: generic_restore_and_replay_contracts_would_be_the_finish_line
      why_it_made_sense: it_promised_systematic_scene_coverage_with_shared_contracts
      what_changed: the_working_baseline_arrived_from_hybrid_scene_playback_not_full_runtime_reconstruction
      replacement_insight: correctness_by_authored_playback_beats_generic_runtime_reconstruction_for_this_port
    - assumption: if_the_static_analyzer_said_the_content_fit_then_runtime_memory_would_be_fine
      why_it_made_sense: march_memory_reports_showed_zero_budget_violations_and_a_heaviest_scene_around_555_3_KB
      what_changed: april_runtime_debugging_found_transient_heap_pressure_and_allocation_shape_problems
      replacement_insight: fit_on_paper_is_not_the_same_as_runtime_allocation_success
    - assumption: the_binary_regression_library_would_remain_a_core_branch_asset
      why_it_made_sense: it_helped_find_regression_boundaries_and_historical_baselines
      what_changed: once_fishing1_worked_the_day_to_day_need_shifted_from_archaeology_to_scene_promotion
      replacement_insight: keep_history_searchable_but_do_not_keep_the_full_weight_in_the_main_repo
    - assumption: fgpilot_was_just_a_temporary_experiment_name
      why_it_made_sense: the_path_started_as_a_pilot
      what_changed: it_became_the_working_render_methodology
      replacement_insight: migrate_the_name_even_though_the_method_survived
  working_style_and_team_dynamics_to_document:
    - exact_scripts_over_hand_typed_variation
    - one_change_then_test_then_write_it_down
    - overlays_dashboards_and_html_reviews_to_make_embedded_failures_legible
    - skepticism_of_false_positives_and_harness_self_congratulation
    - willingness_to_build_throwaway_tools_that_later_become_archaeology
    - shift_from_generic_porting_language_to_bespoke_scene_language_without_losing_rigor
  memory_constraints_and_forcing_functions_to_document:
    - fact: ps1_main_ram_and_vram_forced_every_rendering_decision
      evidence:
        - "PS1 target is 2 MB main RAM and 1 MB VRAM."
        - "The port insists on native 640x480 output."
      impact: forced_a_low_overhead_hybrid_model
    - fact: full_screen_prerender_for_every_scene_was_not_disc_feasible
      evidence:
        - "A 640x480 16-bit frame is about 614400 bytes."
        - "A 640x480 indexed frame is about 307200 bytes."
        - "At scale across 63 scenes this becomes multi-gigabyte storage."
      impact: ruled_out_naive_full_frame_video_style_approaches
    - fact: runtime_heap_shape_mattered_more_than_static_totals
      evidence:
        - "March analyzer summary reported the heaviest scene at about 555.3 KB with zero budget violations."
        - "April wave debugging still hit runtime allocation failure on BACKGRND.BMP despite that paper fit."
      impact: pushed_the_branch_toward_preload_order_and_authored_playback
    - fact: background_tile_backups_were_expensive
      evidence:
        - "Full bg-tile clean copies cost about 614 KB."
        - "The fishing1 rect-based clean backup reduced that dynamic region to about 181 KB."
      impact: justified_scene_specific_rect_backup_and_targeted_runtime_work
    - fact: specific_asset_load_shape_broke_the_wave_path
      evidence:
        - "BACKGRND.PSB was about 93 KB but peaked at about 186 KB because the read path allocated twice."
        - "The raw BMP fallback was about 150 KB."
        - "Loading before bg-tile allocation solved the practical problem."
      impact: validated_preload_order_as_part_of_the_methodology
  what_eventually_worked_to_document:
    - exact_host_captured_foreground_pixels_instead_of_runtime_reconstruction
    - host_captured_sound_events_replayed_through_the_ps1_sfx_pipeline
    - scene_relative_foreground_packs
    - draw_line_and_draw_pixel_capture_for_missing_fg_details
    - narrow_runtime_scene_base_for_ocean_island_waves_and_holiday_overlay
    - preload_large_background_assets_before_bg_tile_allocation
    - rect_based_clean_backups_for_dynamic_regions
    - human_visual_signoff_one_scene_at_a_time
  representative_sources_for_blog_post:
    - docs/archive/CLAUDE.md
    - .claude/skills/ps1-build-workflow.md
    - .claude/skills/ps1-rendering-debug.md
    - docs/ps1/research/AGENT_PROMPT_2026-03-29.md
    - docs/ps1/research/OFFLINE_SCENE_PLAYBACK_PIVOT_2026-04-12.md
    - docs/ps1/research/FOREGROUND_TIMING_PLAN_2026-04-13.md
    - docs/ps1/research/FOREGROUND_TOP_LAYER_LOG_2026-04-13.md
    - docs/ps1/research/FISHING1_PIXEL_PERFECT_PLAN_2026-04-21.md
    - docs/ps1/research/WATER_ANIMATION_HANDOFF_2026-04-21.md
    - docs/ps1/research/WATER_ANIMATION_WORKLOG_2026-04-21.md
    - scripts/wav2vag.py
    - sound_ps1.c
    - host-script-review/verification-summary.json
    - host-results/fishing1-foreground-pilot
    - generated/ps1/foreground
    - binary-library index and metadata only after pruning
  suggested_blog_arc:
    - introduce_the_cast_of_operator_agent_and_harness_builder_personas
    - start_with_the_original_goal_and_why_ps1_was_interesting
    - explain_the_memory_and_resolution_constraints
    - show_how_the_team_changed_jobs_without_changing_standards
    - walk_through_the_automation_and_validation_harness_era
    - walk_through_restore_contracts_and_generic_runtime_attempts
    - cover_the_binary_library_and_archaeology_phase
    - explain_the_hybrid_playback_pivot
    - end_on_fishing1_becoming_first_visually_complete_then_fully_working_with_sfx_and_why_that_changed_everything

