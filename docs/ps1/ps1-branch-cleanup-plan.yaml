      - "When docs mention FISHING 1, they should identify it as the first fully working reference scene: pixel-perfect visually and complete with SFX."
      - "When docs mention regtest or binary-library flows, they should label them as historical or secondary tooling unless explicitly still needed."

fgpilot_naming_migration_plan:
  objective: >
    Migrate the branch away from `fgpilot` as the primary external name while
    preserving backward compatibility during cleanup.
  why_migrate: >
    `fgpilot` was a good temporary engineering label, but it now undersells the
    current methodology by making the proven render path sound experimental.
  canonical_external_name:
    long_form: PS1 scene playback
    descriptive_form: PS1 hybrid scene playback
    short_form_for_docs: scene_playback
  compatibility_terms:
    keep_temporarily:
      - fgpilot
      - foreground pilot
    historical_only_after_migration:
      - fg test
      - pilot path
  migration_stages:
    - stage: docs_language_first
      actions:
        - "Rewrite docs to say `PS1 scene playback (current code name: fgpilot)`."
        - "Keep `fgpilot` only as a compatibility note and internal code reference."
      done_when:
        - "Primary docs no longer use `fgpilot` as the headline term."
    - stage: cli_alias_and_boot_alias
      actions:
        - "Add a new boot/CLI alias such as `sceneplay <scene>` or equivalent."
        - "Keep `fgpilot <scene>` working during the transition."
        - "Update examples so the new alias is primary and `fgpilot` is marked legacy-compatible."
      done_when:
        - "New operator-facing commands no longer lead with `fgpilot`."
    - stage: config_defaults_and_telemetry_surface
      actions:
        - "Update boot defaults, help text, and operator docs to the new naming."
        - "Migrate any diagnostic labels from `fgpilot` to `scene playback` where safe."
      done_when:
        - "Default branch affordances use scene-playback naming."
    - stage: internal_symbol_cleanup_optional
      actions:
        - "Rename code symbols only if that can be done safely without destabilizing the branch."
        - "Treat internal renaming as optional polish, not a prerequisite for branch cleanup."
      done_when:
        - "Code naming is either migrated or intentionally left stable with clear comments."
  hard_rules:
    - "Do not break `fgpilot` compatibility in the first cleanup wave."
    - "Do not rename code symbols before docs and operator surfaces are stable."
    - "Prefer changing human-facing names first, implementation names second."

