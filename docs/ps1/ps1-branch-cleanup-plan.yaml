citation_backbone:
  - claim_id: branch_origin_and_initial_ps1_optimism
    claim: >
      The PS1 branch grew out of the low-memory `4mb2025` line and initially
      looked like a strong fit because of native 640x480 output and aggressive
      memory work already done on the codebase.
    evidence:
      - docs/ps1/project-history.md
      - docs/archive/CLAUDE.md
    note: historical_self_conception_not_current_methodology

  - claim_id: multi_platform_porter_context
    claim: >
      The PS1 effort happened inside a repo culture already shaped by multiple
      bespoke platform ports, not as a one-off isolated experiment.
    evidence:
      - README.md
      - docs/archive/CLAUDE.md
    note: important_for_future_blog_opening_and_team_portrait

  - claim_id: restore_pipeline_became_the_march_truth_surface
    claim: >
      By mid-to-late March, restore specs, cluster contracts, scene packs, and
      promoted-scene counts were the dominant explanation of forward progress.
    evidence:
