reporter_team_portrait:
  framing: >
    The branch reads like the notebook of a small newsroom-lab staffed by
    different but like-minded contributors: a human operator setting the
    standard and several agent/tooling voices that kept changing jobs without
    changing values.
  shared_values_seen_across_docs_history_and_manifests:
    - evidence_before_confidence
    - reproducibility_before_storytelling
    - human_review_before_claimed_validation
    - memory_and_runtime_reality_over_elegant_theory
    - bespoke_pragmatism_when_generic_frameworks_stop_paying_off
    - preserve_the_paper_trail_even_when_the_direction_changes
  observed_roles:
    - role: operator_editor
      description: >
        Sets the bar for what counts as real, rejects convenient wins, and keeps
        redirecting the branch toward what is actually visible on screen.
      strongest_evidence:
        - README.md
        - docs/resuming-1-10-2026.md
        - git_history
    - role: embedded_porter
      description: >
        The early agent voice is a disciplined embedded engineer: cross-compile,
        stub libc, fix freestanding errors, respect exact build scripts, and
        learn the GPU in public.
      strongest_evidence:
        - .claude/skills/cmake-embedded-build.md
        - .claude/skills/embedded-libc-stubs.md
        - .claude/skills/ps1-build-workflow.md
        - .claude/skills/ps1-rendering-debug.md
    - role: instrumentarian
      description: >
        Builds overlays, debug panels, screenshot decoders, manifest contracts,
        and HTML review surfaces so failures become legible instead of
        anecdotal.
      strongest_evidence:
        - docs/PS1_LEFT_DEBUG_PANEL.md
        - docs/PS1_DEBUGGING.md
        - host-script-review/verification-summary.json
        - git_history_2026_03_31_to_2026_04_03
    - role: validator_skeptic
      description: >
        Refuses to count black frames, title frames, or ocean-only frames as
        wins, and treats `63/63` style claims as suspect unless backed by human
        review of actual scene content.
      strongest_evidence:
        - docs/ps1/research/AGENT_PROMPT_2026-03-29.md
        - docs/ps1/research/VALIDATION_LOG_2026-03-29.md
        - config/ps1/regtest-scenes.txt
        - config/ps1/vlm-scene-pack.json
    - role: archaeology_engineer
      description: >
        Builds large historical corpora, onset scans, and sequence or boundary
        tools to understand where the branch went wrong and when it got better.
      strongest_evidence:
        - binary-library/index.json
        - git_history_2026_04_04_to_2026_04_12
    - role: bespoke_scene_engineer
      description: >
        Accepts that the winning PS1 path is not a generic replay system but a
        carefully authored hybrid scene-playback method shaped by memory and
        rendering constraints.
      strongest_evidence:
        - docs/ps1/research/OFFLINE_SCENE_PLAYBACK_PIVOT_2026-04-12.md
        - docs/ps1/research/WATER_ANIMATION_WORKLOG_2026-04-21.md
        - docs/ps1/research/FISHING1_PIXEL_PERFECT_PLAN_2026-04-21.md
        - foreground_pilot.c
        - ads.c
  unifying_read: >
    Different voices handled different phases, but they were aligned on the
    same ethic: make the machine legible, distrust convenient narratives, and
    keep pushing until the screen tells the truth.

agent_perspective_findings:
  phase_1_bootstrap:
    summary: >
      The `.claude` skill set assumes the agent is helping a hard embedded port,
      not running a content pipeline. The emphasis is on exact commands, SDK
      quirks, missing libc, draw-order bugs, and memory maps.
    implications_for_cleanup:
      - preserve_the_skill_docs_as_primary_archaeology
      - do_not_rewrite_history_as_if_scene_playback_was_obvious_from_day_one
  phase_2_harness_maximalism:
    summary: >
      March and early April docs show the agent evolving into a harness builder
      and validation skeptic. The system produced HTML dashboards, compare
      reports, semantic truth manifests, VLM packs, and regression floors to
      avoid lying to itself.
    implications_for_cleanup:
      - archive_harnesses_as_a_coherent_era_not_as_random_script_sprawl
      - preserve_one_manifest_one_review_page_and_one_summary_per_harness_family
  phase_3_archaeology_to_bespoke_method:
    summary: >
      Early April commits and machine manifests show a large-scale archaeology
      phase, but April 12 to April 22 collapses into a direct bespoke line of
      work: capture the winning scene, tighten the runtime, and validate the
      visible result.
    implications_for_cleanup:
      - promote_april_12_to_april_22_as_the_current_story
      - demote_binary_library_and_old_regtest_status_from_branch_homepage_truth
  phrases_to_retire_from_primary_docs:
    - blocked_baseline
    - verified_by_harness_only
    - fg_test
    - pilot_only
    - 60_of_63_currently_verified
    - 25_of_63_verified
  phrases_to_preserve_as_historical_markers:
    - bringup
    - restore_packs
    - host_truth
    - semantic_truth
    - vision_reference_pipeline
    - binary_regression
    - onset_scan
    - fgpilot

