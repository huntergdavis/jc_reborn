document: "ps1_archaeology_team_perspective"
source_plan: "../ps1-branch-cleanup-plan.yaml"
source_stanzas:
  - "reporter_team_portrait"
links:
  cleanup_plan: "../ps1-branch-cleanup-plan.yaml"
  siblings:
    - "./timeline.yaml"
    - "./tools.yaml"
    - "./status-surfaces.yaml"
    - "./assumptions.yaml"
    - "./memory-constraints.md"
    - "./blog-source-map.md"
    - "./reporter-notes.md"
framing: "The branch reads like the notebook of a small newsroom-lab: different contributors, same standard."
shared_values:
  - "evidence_before_confidence"
  - "reproducibility_before_storytelling"
  - "human_review_before_claimed_validation"
  - "memory_and_runtime_reality_over_elegant_theory"
  - "bespoke_pragmatism_when_generic_frameworks_stop_paying_off"
  - "preserve_the_paper_trail_even_when_the_direction_changes"
roles:
  - role: "operator_editor"
    description: "Sets the bar for what counts as real, rejects convenient wins, and keeps pushing toward visible on-screen truth."
    strongest_evidence:
      - "README.md"
      - "docs/resuming-1-10-2026.md"
      - "git_history"
  - role: "embedded_porter"
    description: "Disciplined embedded engineer voice: cross-compile, stub libc, fix freestanding errors, and respect exact build scripts."
    strongest_evidence:
      - ".claude/skills/cmake-embedded-build.md"
      - ".claude/skills/embedded-libc-stubs.md"
      - ".claude/skills/ps1-build-workflow.md"
      - ".claude/skills/ps1-rendering-debug.md"
  - role: "instrumentarian"
    description: "Builds overlays, debug panels, manifest contracts, and HTML review surfaces so failure becomes legible."
    strongest_evidence:
      - "docs/PS1_LEFT_DEBUG_PANEL.md"
      - "docs/PS1_DEBUGGING.md"
      - "host-script-review/verification-summary.json"
      - "git_history_2026_03_31_to_2026_04_03"
  - role: "validator_skeptic"
    description: "Refuses to count black frames, title frames, or ocean-only frames as wins without human review."
    strongest_evidence:
      - "docs/ps1/research/AGENT_PROMPT_2026-03-29.md"
      - "docs/ps1/research/VALIDATION_LOG_2026-03-29.md"
      - "config/ps1/regtest-scenes.txt"
      - "config/ps1/vlm-scene-pack.json"
  - role: "archaeology_engineer"
    description: "Builds historical corpora, onset scans, and boundary tools to understand when the branch regressed and recovered."
    strongest_evidence:
      - "binary-library/index.json"
      - "git_history_2026_04_04_to_2026_04_12"
  - role: "bespoke_scene_engineer"
    description: "Accepts that the winning PS1 line is a carefully authored hybrid scene-playback method, not a generic replay finish line."
    strongest_evidence:
      - "docs/ps1/research/OFFLINE_SCENE_PLAYBACK_PIVOT_2026-04-12.md"
      - "docs/ps1/research/WATER_ANIMATION_WORKLOG_2026-04-21.md"
      - "docs/ps1/research/FISHING1_PIXEL_PERFECT_PLAN_2026-04-21.md"
      - "foreground_pilot.c"
      - "ads.c"
unifying_read: "Different voices handled different phases, but they stayed aligned on one ethic: make the machine legible, distrust convenient narratives, and keep pushing until the screen tells the truth."
