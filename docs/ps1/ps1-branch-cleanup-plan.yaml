      - link_structure_matches_the_new_document_hierarchy

  - id: phase_07_final_verification
    goal: confirm_the_cleanup_changed_the_narrative_not_the_working_scene
    actions:
      - run_the_current_fgpilot_fishing1_flow_again
      - confirm_sfx_still_replays_correctly_for_the_reference_scene
      - confirm_fishing1_assets_and_host_capture_bundle_still_exist_where_needed
      - search_docs_and_scripts_for_demoted_terms_and_stale_claims
    done_when:
      - docs_are_current
      - artifacts_are_reorganized
      - the_fully_working_fishing1_path_is_unchanged

