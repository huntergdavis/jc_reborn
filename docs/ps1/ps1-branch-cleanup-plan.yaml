      purpose: regenerate_ps1_vag_assets_for_the_current_sfx_pipeline
    - step: export_or_refresh_fishing1_reference_bundle
      command: "./scripts/export-scene-foreground-pilot.sh"
      purpose: regenerate_host_capture_fg1_draw_event_and_sound_event_artifacts
    - step: build_and_run_ps1_scene
      command: "./scripts/rebuild-and-let-run.sh fgpilot fishing1"
      purpose: validate_live_ps1_fgpilot_scene
    - step: validate_scene_variants
      command_examples:
        - "./scripts/rebuild-and-let-run.sh fgpilot fishing1 lowtide 1"
        - "./scripts/rebuild-and-let-run.sh fgpilot fishing1 raft-stage 5"
        - "./scripts/rebuild-and-let-run.sh fgpilot fishing1 night 1"
        - "./scripts/rebuild-and-let-run.sh fgpilot fishing1 holiday 4"
      purpose: verify_state_variants_in_the_current_render_path
    - step: capture_new_host_frames_for_future_scene_expansion
      command: "./scripts/capture-host-scene.sh --scene \"FISHING 1\" --mode story-single --foreground-only"
