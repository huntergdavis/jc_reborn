future_cleanup_phases:
  - id: phase_01_protect_baseline
    goal: freeze_the_current_truth_before_reorganization
    actions:
      - record_the_release_tag_v0_3_6_ps1_as_the_reference_baseline
      - preserve_the_visual_only_v0_3_5_ps1_release_as_the_immediately_previous_milestone
      - verify_the_dirty_tree_and_do_not_revert_it
      - inventory_active_fishing1_assets_and_host_results
      - copy_any_must_keep_metadata_out_of_heavy_artifact_trees_before_pruning
    done_when:
      - active_fishing1_surface_is_explicitly_protected
      - future_moves_cannot_accidentally_discard_current_work

  - id: phase_02_rewrite_primary_docs
    goal: make_repo_entrypoints_match_current_branch_reality
    actions:
      - rewrite_docs_ps1_README_md_around_fgpilot_as_primary_render_method
      - rewrite_docs_ps1_current_status_md_around_the_fishing1_baseline_and_scene_by_scene_validation
      - rewrite_docs_ps1_development_workflow_md_to_show_the_live_operator_loop
      - rewrite_docs_ps1_TESTING_md_to_demote_binary_library_and_regtest_from_primary_status
      - add_explicit_sources_for_every_primary_status_number_milestone_and_major_historical_claim
      - normalize_term_usage_so_fgpilot_is_no_longer_presented_as_a_test_path
    done_when:
      - a_new_reader_would_understand_the_current_method_without_reading_research_logs
      - all_primary_docs_identify_FISHING_1_as_the_reference_scene
      - primary_docs_no_longer_make_uncited_historical_claims

  - id: phase_02a_migrate_fgpilot_naming
    goal: move_external_language_from_fgpilot_to_scene_playback
    actions:
      - rewrite_docs_to_use_scene_playback_as_the_primary_name
      - add_a_compatible_cli_or_boot_alias_before_removing_fgpilot_from_examples
      - relabel_default_examples_and_boot_defaults_after_compatibility_exists
    done_when:
      - primary_operator_docs_no_longer_lead_with_fgpilot
      - fgpilot_survives_only_as_compatibility_or_historical_terminology

  - id: phase_02b_reset_validation_status
    goal: replace_old_counts_with_a_clean_1_of_63_scene_ledger
    actions:
      - create_the_new_scene_validation_status_surface
      - seed_only_FISHING_1_as_validated_reference
      - archive_old_restore_regtest_and_bringup_counts_as_history
    done_when:
      - the_primary_status_surface_says_1_of_63_complete
      - no_primary_doc_claims_25_of_63_or_60_of_63_as_current_truth

  - id: phase_03_split_current_vs_historical_research
    goal: stop_mixing_live_reference_material_with_old_exploration
    actions:
      - keep_april_fgpilot_history_files_but_label_them_as_design_logs
      - move_superseded_status_snapshots_and_rollout_docs_to_archive_locations
      - keep_only_a_small_set_of_current_reference_docs_near_the_top_of_docs_ps1_research
    done_when:
      - research_root_no_longer_claims_2026_03_21_is_current_truth
      - historical_material_is_preserved_but_not_confused_with_operator_docs

  - id: phase_03a_capture_archaeology_before_pruning
    goal: preserve_the_story_before_the_noise_is_removed
    actions:
      - create_the_archaeology_timeline_tools_and_assumptions_indices
      - create_the_status_surface_timeline_showing_how_25_27_57_60_63_and_1_of_63_differ
      - summarize_each_historical_harness_family
      - preserve_representative_examples_for_blog_post_use
      - capture_memory_constraints_and_methodology_pivots_in_one_place
    done_when:
      - future_cleanup_can_archive_old_material_without_erasing_its_narrative_value

  - id: phase_04_retire_binary_library_surface
    goal: remove_the_heaviest_obsolete_validation_stack_from_the_primary_branch_surface
    actions:
      - generate_and_store_archive_manifest_before_any_payload_removal
      - export_or_preserve_a_small_manifest_of_binary_library_contents
      - prove_sample_rebuilds_from_retained_metadata
      - archive_binary_library_outside_the_repo
      - remove_binary_library_specific_scripts_from_primary_documentation
      - archive_or_remove_binary_library_specific_scripts_after_confirmation
    done_when:
      - binary_library_is_no_longer_the_default_story_of_the_branch
      - repo_surface_is_significantly_smaller_and_clearer

  - id: phase_05_prune_or_archive_other_heavy_artifacts
    goal: reduce_noise_from_large_historical_outputs_without_losing_provenance
    actions:
      - prune_regtest_references_to_a_small_named_subset_or_archive_them_out_of_repo
      - archive_vision_artifacts_and_host_script_review_to_secondary_history_locations
      - keep_host_results_fishing1_foreground_pilot_until_a_replacement_reference_package_exists
    done_when:
      - heavy_artifacts_match_current_branch_needs
      - active_scene_work_is_not_buried_under_old_outputs

  - id: phase_06_refresh_configs_and_reference_indices
    goal: eliminate_conflicting_status_signals
    actions:
      - update_config_ps1_regtest_scenes_txt_or_split_its_status_model
      - refresh_doc_indices_and_cross_links
      - ensure_primary_docs_point_to_the_new_cleanup_plan_and_current_method
    done_when:
