  Professionalize the PS1 branch by rewriting stale references, preserving the
  proven FISHING 1 fgpilot workflow as the current source of truth, now with
  the full visual-plus-SFX baseline reflected accurately, archiving historical
  research and validation artifacts, and retiring obsolete binary-library-
  driven cleanup paths after safe archival.

