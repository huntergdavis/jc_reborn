assumptions:
  - assumption: "broad_automation_would_be_the_primary_truth_surface"
    why_it_made_sense: "Lots of scenes and a need for scalable feedback."
    what_changed: "Human scene-by-scene signoff proved more useful for the final method."
    replacement_insight: "Automation is supporting archaeology, not primary certification."
  - assumption: "generic_restore_and_replay_contracts_would_be_the_finish_line"
    why_it_made_sense: "It promised systematic scene coverage through shared contracts."
    what_changed: "The working baseline arrived from hybrid scene playback, not full runtime reconstruction."
    replacement_insight: "Correctness by authored playback beat generic runtime reconstruction for this port."
  - assumption: "if_the_static_analyzer_said_the_content_fit_then_runtime_memory_would_be_fine"
    why_it_made_sense: "March memory reports showed zero budget violations and a heaviest scene around 555.3 KB."
    what_changed: "April runtime debugging exposed transient heap pressure and allocation-shape failures."
    replacement_insight: "Fit on paper is not the same as runtime allocation success."
  - assumption: "the_binary_regression_library_would_remain_a_core_branch_asset"
    why_it_made_sense: "It was effective for finding regression boundaries and historical baselines."
    what_changed: "Once FISHING 1 worked, day-to-day need shifted from archaeology to scene promotion."
    replacement_insight: "Keep history searchable, but not at full weight in the main repo."
  - assumption: "fgpilot_was_just_a_temporary_experiment_name"
    why_it_made_sense: "The path began as a pilot."
    what_changed: "It became the working render methodology."
    replacement_insight: "Migrate the name even though the method survived."
