      - abstract_theory_docs_without_scene_proof

validation_reset_plan:
  objective: >
    Replace legacy rollout counts and old harness-centric status models with a
    clean scene-by-scene validation ledger aligned to the current methodology.
  old_status_surfaces_to_demote:
    - docs/ps1/current-status.md legacy counts such as 25/63
    - docs/ps1/TESTING.md legacy headless verification framing such as 60/63
    - config/ps1/regtest-scenes.txt bringup/blocked/untested route inventory
    - docs/ps1/research/CURRENT_STATUS_2026-03-21.*
    - docs/ps1/research/CURRENT_STATUS_2026-04-16.md
  new_authoritative_validation_model:
    name: scene_by_scene_reference_validation
    as_of_plan_creation:
      total_scenes: 63
      validated_reference_scenes: 1
      validated_reference_scene_list:
        - FISHING 1
      active_reference_scene_count_statement: "1 / 63 complete"
    principles:
      - "A scene counts as done only after signoff in the current scene-playback methodology, including audio where the scene now supports it."
      - "Legacy restore/regtest/automation statuses do not roll forward as current completion credit."
      - "One scene at a time beats broad but stale coverage counts."
      - "Old validation surfaces are history, not the live scoreboard."
    proposed_new_source_of_truth:
      path: docs/ps1/scene-validation-status.yaml
      format: machine_readable
      minimum_fields:
        - scene
        - status
        - validation_route
        - validated_variants
        - reference_artifacts
        - last_signoff_date
        - notes
        - legacy_status_links
    status_vocabulary:
      - validated_reference
      - active_validation
      - queued
      - not_started
      - archived_legacy_reference_only
    initial_seed_rules:
      - "Seed `FISHING 1` as `validated_reference`."
      - "Seed every other scene as `not_started` unless explicitly promoted later."
      - "Carry legacy route details as notes or links, not as completion state."
  migration_actions:
    - "Archive old counts and route-specific statuses into archaeology docs."
    - "Stop showing 25/63, 60/63, bringup, blocked, or untested as the primary branch status."
    - "If regtest route inventories remain, label them as legacy route manifests rather than current completion state."

artifact_inventory:
  - path: binary-library
    role: historical_regression_corpus
    approximate_size: 118G
    approximate_files: 24629
    current_value: low_for_day_to_day_scene_work
    disposition: archive_out_of_repo_then_remove_from_primary_worktree
    retention_goal: keep_small_manifest_and_any_must_keep_summary_only
