project_eras:
  - era: embedded_port_bootstrap_and_runtime_survival
    date_range: "2025-10-18..2026-03-16"
    summary: >
      The first long stretch was classic embedded-port work: cross-compilation,
      PS1 build and CD flow, CD-ROM I/O, primitive rendering order, sprite and
      heap stabilization, and basic platform survival at native 640x480.
      The agent-facing docs from this era read like a field manual for getting
      a difficult target to boot, render, and stay alive.
    keep_as: foundational_origin_story
    disposition: preserve_as_foundational_archaeology

  - era: restore_pack_and_rollout_surface
    date_range: "2026-03-17..2026-03-28"
    summary: >
      March work centered on restore specs, rollout manifests, scene clusters,
      dirty-region templates, and proving broad scene coverage through the
      restore-pack pipeline.
    keep_as: historical_research
    disposition: archive_and_demote

  - era: validation_and_instrumentation_maximalism
    date_range: "2026-03-29..2026-04-11"
    summary: >
      The branch then became a measurement machine: scene validation prompts,
      host truth, semantic truth, HTML review surfaces, VLM and classifier
      packs, screenshot overlays, headless regtests, and large binary-library
      archaeology intended to prevent false confidence.
    keep_as: historical_validation_infrastructure
