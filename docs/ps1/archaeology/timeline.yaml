eras:
  - era: "embedded_port_bootstrap_and_runtime_survival"
    date_range: "2025-10-18..2026-03-16"
    summary: "Cross-compilation, PS1 build and CD flow, CD-ROM I/O, primitive rendering order, sprite and heap stabilization, and basic platform survival at native 640x480."
    keep_as: "foundational_origin_story"
    disposition: "preserve_as_foundational_archaeology"
  - era: "restore_pack_and_rollout_surface"
    date_range: "2026-03-17..2026-03-28"
    summary: "Restore specs, rollout manifests, scene clusters, dirty-region templates, and broad scene coverage claims through the restore-pack pipeline."
    keep_as: "historical_research"
    disposition: "archive_and_demote"
  - era: "validation_and_instrumentation_maximalism"
    date_range: "2026-03-29..2026-04-11"
    summary: "Validation prompts, host truth, semantic truth, HTML review surfaces, VLM and classifier packs, screenshot overlays, headless regtests, and large binary-library archaeology."
    keep_as: "historical_validation_infrastructure"
    disposition: "archive_and_summarize_as_one_coherent_phase"
  - era: "binary_library_and_regression_archaeology"
    date_range: "2026-04-04..2026-04-11"
    summary: "Large historical binary corpus plus scan and bisection tooling for FISHING 1 onset and regression-boundary work."
    keep_as: "historical_debugging_context"
    disposition: "archive_out_of_repo_then_remove_from_primary_branch_surface"
  - era: "foreground_playback_pivot_to_validated_baseline"
    date_range: "2026-04-12..2026-04-22"
    summary: "Offline foreground playback matured into the winning line: scene-relative composition, ocean restore, wave animation, draw-event capture, variant validation, and full SFX playback until FISHING 1 became fully working."
    keep_as: "authoritative_current_methodology"
    disposition: "promote_and_document"
