document: "ps1_archaeology_tools_catalog"
source_plan: "../ps1-branch-cleanup-plan.yaml"
source_stanzas:
  - "historical_harness_archive_groups"
  - "script_recency_signals"
  - "script_policy"
links:
  cleanup_plan: "../ps1-branch-cleanup-plan.yaml"
  siblings:
    - "./timeline.yaml"
    - "./status-surfaces.yaml"
    - "./team-perspective.yaml"
    - "./assumptions.yaml"
    - "./memory-constraints.md"
    - "./blog-source-map.md"
    - "./reporter-notes.md"
catalog_method:
  scope: "Group-level purpose from the cleanup plan, with per-path role hints kept terse."
  recency_caveat: "Git history records last modification, not operator usage."
  deprecation_checks_required:
    - "scan_docs_scripts_and_config_for_references"
    - "check_whether_another_script_invokes_it"
    - "check_whether_it_is_needed_to_regenerate_archived_artifacts"
    - "confirm_it_is_not_part_of_the_current_operator_loop"
harness_groups:
  - group: "regtest_harness_stack"
    purpose: "Historical validation and debugging through headless and scene-matrix regtest surfaces."
    disposition: "archive_or_keep_secondary_only"
    members:
      - path: "scripts/build-regtest-image.sh"
        role_hint: "Builds the regtest image surface."
      - path: "scripts/run-regtest.sh"
        role_hint: "Runs the primary regtest route."
      - path: "scripts/regtest-scene.sh"
        role_hint: "Executes scene-level regtest runs."
      - path: "scripts/regtest-all-scenes.sh"
        role_hint: "Sweeps the full scene set under regtest."
      - path: "scripts/regtest-compare.sh"
        role_hint: "Compares regtest outputs."
      - path: "scripts/regtest-audit-story-vs-ads.sh"
        role_hint: "Audits story output against ADS-facing output."
      - path: "scripts/regtest-audit-story-vs-direct.sh"
        role_hint: "Audits story output against direct output."
      - path: "scripts/regtest-audit-story-vs-direct-batch.sh"
        role_hint: "Runs story-vs-direct audits in batch."
      - path: "scripts/regtest-fgpilot-fishing1-exact.sh"
        role_hint: "Checks the FISHING 1 fgpilot path with exactness-focused regtest coverage."
      - path: "scripts/regtest-fgpilot-fishing1-scene-matrix.sh"
        role_hint: "Exercises FISHING 1 fgpilot variants as a scene matrix."
      - path: "scripts/render-regtest-run.py"
        role_hint: "Renders regtest run summaries or review surfaces."
      - path: "config/ps1/regtest-config.sh"
        role_hint: "Shared config for regtest execution."
      - path: "config/ps1/Dockerfile.regtest"
        role_hint: "Container surface for regtest tooling."
      - path: "config/ps1/duckstation-regtest.patch"
        role_hint: "Emulator patching for regtest behavior."
      - path: "config/ps1/regtest-scenes.txt"
        role_hint: "Scene ledger for the regtest route."
      - path: "docs/ps1/TESTING.md"
        role_hint: "Primary regtest-facing operator document."
      - path: "docs/ps1/regtest-harness.md"
        role_hint: "Harness reference for the regtest stack."
      - path: "docs/ps1/regtest-quickstart.md"
        role_hint: "Quickstart for the regtest route."
      - path: "regtest-references"
        role_hint: "Reference corpus used by the regtest stack."
  - group: "vision_vlm_llm_harness_stack"
    purpose: "Automation-heavy visual and semantic review pipeline used to avoid false confidence at scale."
    disposition: "archive"
    members:
      - path: "scripts/vision_classifier.py"
        role_hint: "Classifier-based visual judgment helper."
      - path: "scripts/vision_vlm.py"
        role_hint: "VLM-facing visual review helper."
      - path: "scripts/validate-ps1-vlm.py"
        role_hint: "Validation entrypoint for PS1 VLM review."
      - path: "scripts/validate-vision-pipeline.py"
        role_hint: "Checks the end-to-end vision pipeline."
      - path: "scripts/publish-vision-pipeline.py"
        role_hint: "Publishes vision-pipeline outputs."
      - path: "scripts/run-vision-reference-pipeline.sh"
        role_hint: "Runs the reference vision pipeline."
      - path: "scripts/setup-vision-vlm-openvino.sh"
        role_hint: "Sets up OpenVINO-backed VLM tooling."
      - path: "scripts/render-vlm-scene-pack-review.py"
        role_hint: "Builds review surfaces for VLM scene packs."
      - path: "scripts/render-vlm-vs-heuristic.py"
        role_hint: "Compares VLM output against heuristic output."
      - path: "scripts/compile-host-semantic-truth.py"
        role_hint: "Compiles host-side semantic truth surfaces."
      - path: "scripts/evaluate-semantic-regression.py"
        role_hint: "Scores semantic regressions over time."
      - path: "config/ps1/vlm-scene-pack.json"
        role_hint: "Scene-pack contract for VLM review."
      - path: "vision-artifacts"
        role_hint: "Generated artifact forest for the vision stack."
  - group: "host_review_and_annotation_stack"
    purpose: "Historical inspection infrastructure that made host-side behavior and annotations reviewable."
    disposition: "archive"
    members:
      - path: "scripts/refresh-host-script-review.sh"
        role_hint: "Refreshes the host script review bundle."
      - path: "scripts/compare-host-script-vs-expectations.py"
        role_hint: "Compares host script output against expected behavior."
      - path: "scripts/render-host-script-index.py"
        role_hint: "Builds index views for host script review."
      - path: "scripts/generate-scene-annotation-review.py"
        role_hint: "Generates scene annotation review material."
      - path: "scripts/serve-scene-annotation-review.py"
        role_hint: "Serves the annotation review surface."
      - path: "scripts/launch-fishing1-annotation-review.sh"
        role_hint: "Launches FISHING 1 annotation review."
      - path: "scripts/launch-fishing1-full-annotation-review.sh"
        role_hint: "Launches the expanded FISHING 1 annotation review surface."
      - path: "scripts/render-frame-meta-review.py"
        role_hint: "Renders frame metadata review pages."
      - path: "scripts/verify-host-script-review.sh"
        role_hint: "Verifies host script review outputs."
      - path: "scripts/test-verify-host-script-review-head-mismatch.sh"
        role_hint: "Negative coverage for host review verification."
      - path: "scripts/test-verify-host-script-review-negative.sh"
        role_hint: "Additional negative coverage for host review verification."
      - path: "host-script-review"
        role_hint: "Generated review bundle for host-script inspection."
script_surfaces:
  keep_live:
    - path: "scripts/build-host.sh"
      policy: "keep_live"
      role: "Core host build entrypoint."
    - path: "scripts/build-ps1.sh"
      policy: "keep_live"
      role: "Core PS1 build entrypoint."
    - path: "scripts/make-cd-image.sh"
      policy: "keep_live"
      role: "Core CD image build entrypoint."
    - path: "scripts/rebuild-and-let-run.sh"
      policy: "keep_live"
      role: "Canonical operator loop for build and launch."
      last_touched_commit: "12641bfc"
      last_touched_date: "2026-04-22"
    - path: "scripts/convert-sounds.sh"
      policy: "keep_live"
      role: "Canonical PS1 sound conversion wrapper."
    - path: "scripts/wav2vag.py"
      policy: "keep_live"
      role: "Canonical VAG encoder for the active audio pipeline."
      last_touched_commit: "355227fa"
      last_touched_date: "2026-04-22"
    - path: "scripts/capture-host-scene.sh"
      policy: "keep_live"
      role: "Canonical host capture workflow."
      last_touched_commit: "1c7481ca"
      last_touched_date: "2026-04-12"
    - path: "scripts/export-scene-foreground-pilot.sh"
      policy: "keep_live"
      role: "Canonical host export workflow for scene playback packs."
      last_touched_commit: "16345973"
      last_touched_date: "2026-04-22"
    - path: "scripts/build-scene-foreground-pack.py"
      policy: "keep_live"
      role: "Canonical foreground pack compiler."
      last_touched_commit: "8670d2a5"
      last_touched_date: "2026-04-22"
    - path: "scripts/build-foreground-draw-pack.py"
      policy: "keep_live"
      role: "Canonical draw-event pack compiler."
      last_touched_commit: "uncommitted_at_plan_creation"
      last_touched_date: "2026-04-22"
  keep_but_demote_from_primary_docs:
    - path: "scripts/regtest-scene.sh"
      policy: "keep_but_demote_from_primary_docs"
      role: "Secondary regtest scene runner."
    - path: "scripts/run-regtest.sh"
      policy: "keep_but_demote_from_primary_docs"
      role: "Secondary regtest entrypoint."
    - path: "scripts/regtest-fgpilot-fishing1-exact.sh"
      policy: "keep_but_demote_from_primary_docs"
      role: "Secondary exactness check for the old fgpilot/regtest bridge."
      last_touched_commit: "bf517857"
      last_touched_date: "2026-04-13"
    - path: "scripts/regtest-fgpilot-fishing1-scene-matrix.sh"
      policy: "keep_but_demote_from_primary_docs"
      role: "Secondary scene-matrix coverage for FISHING 1 variants."
    - path: "scripts/compare-regtest-result-bundles.py"
      policy: "keep_but_demote_from_primary_docs"
      role: "Secondary bundle comparison surface."
  archive_candidates:
    - path: "scripts/build-binary-library.sh"
      policy: "archive_candidate"
      role: "Builds the large binary-library archaeology corpus."
      last_touched_commit: "0c6387a9"
      last_touched_date: "2026-04-12"
    - path: "scripts/regtest-binary-library-scene.sh"
      policy: "archive_candidate"
      role: "Runs binary-library scene archaeology."
      last_touched_commit: "fa5be68e"
      last_touched_date: "2026-04-12"
    - path: "scripts/scan-fishing1-binary-regression.sh"
      policy: "archive_candidate"
      role: "Scans for FISHING 1 binary regression windows."
      last_touched_commit: "8d2e6d90"
      last_touched_date: "2026-04-11"
    - path: "scripts/find-fishing1-regression-boundary.py"
      policy: "archive_candidate"
      role: "Locates regression boundaries in the binary history."
    - path: "scripts/find-fishing1-startup-onset.sh"
      policy: "archive_candidate"
      role: "Searches for the onset of FISHING 1 startup behavior."
      last_touched_commit: "8d2e6d90"
      last_touched_date: "2026-04-11"
    - path: "scripts/find-fishing1-visibility-onset.sh"
      policy: "archive_candidate"
      role: "Searches for the onset of visible FISHING 1 output."
      last_touched_commit: "8d2e6d90"
      last_touched_date: "2026-04-11"
    - path: "scripts/continue-fishing1-startup-onset.sh"
      policy: "archive_candidate"
      role: "Continues the startup-onset archaeology pass."
    - path: "scripts/refine-fishing1-startup-onset.sh"
      policy: "archive_candidate"
      role: "Refines startup-onset archaeology results."
    - path: "scripts/refine-fishing1-visibility-onset.sh"
      policy: "archive_candidate"
      role: "Refines visibility-onset archaeology results."
    - path: "scripts/report-binary-library-epochs.py"
      policy: "archive_candidate"
      role: "Reports epochs across the binary library."
      last_touched_commit: "5d374a46"
      last_touched_date: "2026-04-11"
    - path: "scripts/report-binary-library-gaps.py"
      policy: "archive_candidate"
      role: "Reports gaps in the binary library."
    - path: "scripts/report-binary-library-sequence-resets.py"
      policy: "archive_candidate"
      role: "Reports sequence resets in the binary library."
    - path: "scripts/verify-fishing1-head-clean.sh"
      policy: "archive_candidate"
      role: "Checks head cleanliness in FISHING 1 archaeology runs."
      last_touched_commit: "047c1685"
      last_touched_date: "2026-04-11"
