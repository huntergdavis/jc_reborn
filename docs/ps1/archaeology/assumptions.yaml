document: "ps1_archaeology_assumptions"
source_plan: "../ps1-branch-cleanup-plan.yaml"
source_stanzas:
  - "project_archaeology_plan.historical_assumptions_to_capture"
links:
  cleanup_plan: "../ps1-branch-cleanup-plan.yaml"
  siblings:
    - "./timeline.yaml"
    - "./tools.yaml"
    - "./status-surfaces.yaml"
    - "./team-perspective.yaml"
